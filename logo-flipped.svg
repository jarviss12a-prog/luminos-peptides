<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="markGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g transform="translate(14, 14)">
    <!-- Rays spreading wide upward from apex -->
    <line x1="40" y1="38" x2="4"  y2="4"  stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="40" y1="38" x2="20" y2="2"  stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
    <line x1="40" y1="38" x2="40" y2="0"  stroke="#2563eb" stroke-width="2"   stroke-linecap="round" opacity="0.9"/>
    <line x1="40" y1="38" x2="60" y2="2"  stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
    <line x1="40" y1="38" x2="76" y2="4"  stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Small pyramid — apex at top -->
    <polygon points="40,40 62,72 18,72" fill="url(#markGrad)" />
    <line x1="40" y1="40" x2="40" y2="72" stroke="white" stroke-width="1" stroke-opacity="0.3"/>
    <polygon points="40,40 62,72 18,72" fill="none" stroke="#1e40af" stroke-width="0.8"/>
  </g>

  <!-- Wordmark -->
  <text x="116" y="52"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="700"
    letter-spacing="6"
    fill="#111827">LUMINOS</text>

  <text x="118" y="73"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="5"
    fill="#6b7280">PEPTIDES</text>

  <line x1="116" y1="79" x2="346" y2="79" stroke="#e5e7eb" stroke-width="0.8"/>

  <text x="116" y="95"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="9"
    font-weight="400"
    letter-spacing="2.5"
    fill="#9ca3af">RESEARCH GRADE · THIRD-PARTY TESTED</text>
</svg>
